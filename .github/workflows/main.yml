name: Deploy Hexo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy with Hexo
        run: |
          sed -i 's|repo: https://github.com/yi0x44f/myBlog.git|repo: https://github-actions:${{ secrets.GITHUB_TOKEN }}@github.com/yi0x44f/myBlog.git|g' _config.yml
          npx hexo generate -d